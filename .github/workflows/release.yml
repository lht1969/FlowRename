name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

# 全局互斥：同一时间只允许一个 release 运行
concurrency:
  group: release-single
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check-and-prepare:
    # 只在 CI 成功且有版本标签时运行
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Check if this is a version tag
        id: check
        shell: bash
        run: |
          # 从 CI 触发的分支名提取版本
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          
          # 检查是否是版本标签 (v1.0.0 格式)
          if [[ "$BRANCH" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            VERSION="${BRANCH#v}"
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "✅ 检测到版本标签: v$VERSION，将执行发布"
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "⏭️ 不是版本标签，跳过发布"
          fi

  build:
    needs: check-and-prepare
    if: ${{ needs.check-and-prepare.outputs.should_release == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            artifact_name: windows
            bundle_path: src-tauri/target/release/bundle
            glob_pattern: |
              *.msi
              *.exe

          - os: macos-14
            target: aarch64-apple-darwin
            artifact_name: macos
            bundle_path: src-tauri/target/release/bundle/macos
            glob_pattern: |
              *.app.zip
            tauri_args: -- --bundles app

          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_name: linux
            bundle_path: src-tauri/target/release/bundle
            glob_pattern: |
              *.AppImage
              *.deb

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-release-

      - name: Build Tauri app
        run: |
          npm run tauri build ${{ matrix.tauri_args }}

      - name: Zip macOS .app bundle
        if: runner.os == 'macOS'
        shell: bash
        run: |
          APP_NAME="FlowRename"
          APP_PATH="src-tauri/target/release/bundle/macos/${APP_NAME}.app"
          
          if [ -d "$APP_PATH" ]; then
            echo "📦 正在打包 macOS 应用..."
            cd src-tauri/target/release/bundle/macos/
            ditto -c -k "${APP_NAME}.app" "${APP_NAME}.app.zip"
            cd -
            echo "✅ 打包完成: ${APP_NAME}.app.zip"
          else
            echo "❌ 未找到 .app bundle: $APP_PATH"
            exit 1
          fi

      - name: List bundle artifacts
        shell: bash
        run: |
          echo "=== 构建产物目录内容 ==="
          find ${{ matrix.bundle_path }} -type f 2>/dev/null || echo "(目录不存在)"
          echo ""
          echo "=== 文件列表 ==="
          ls -la ${{ matrix.bundle_path }}/* 2>/dev/null || echo "无文件"

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-bundle
          path: ${{ matrix.bundle_path }}/${{ matrix.glob_pattern }}
          if-no-files-found: error

  create-release:
    needs: [check-and-prepare, build]
    if: ${{ always() && needs.build.result == 'success' && needs.check-and-prepare.outputs.should_release == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Download all bundle artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: *-bundle
          merge-multiple: true
          path: ./artifacts

      - name: List downloaded artifacts
        shell: bash
        run: |
          echo "=== 下载的构建产物 ==="
          ls -la ./artifacts/
          echo ""
          echo "=== 文件详情 ==="
          find ./artifacts -type f -exec ls -lh {} \;

      - name: Set version
        run: |
          echo "VERSION=${{ needs.check-and-prepare.outputs.version }}" >> $GITHUB_ENV

      - name: Generate release notes
        shell: bash
        run: |
          VERSION="${{ env.VERSION }}"
          cat > RELEASE_NOTES.md << 'EOF'
          ## FlowRename v${VERSION}

          ### 📦 下载说明

          | 平台 | 文件 | 说明 |
          |---|---|---|
          | Windows | `*.msi` | 推荐使用 MSI 安装包 |
          | Windows | `*.exe` | NSIS 安装程序 |
          | macOS | `*.app.zip` | 解压后拖动到 Applications 文件夹 |
          | Linux | `*.AppImage` | 直接运行，无需安装 |
          | Linux | `*.deb` | Debian/Ubuntu 安装包 |

          ### ⚠️ 注意事项
          - **macOS**: 应用未签名，首次打开需右键选择"打开"
          - **Linux**: 需要 WebKit2GTK 4.1 和 GTK3 依赖

          ### 🔧 系统要求
          - **Windows**: Windows 10+，需要 WebView2 Runtime
          - **macOS**: macOS 10.15+ (Catalina)，Apple Silicon
          - **Linux**: 支持 AppImage 或 DEB 的发行版
          EOF
          
          # 替换环境变量
          sed -i "s/\${VERSION}/$VERSION/g" RELEASE_NOTES.md
          
          echo "=== 发布说明 ==="
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: FlowRename v${{ env.VERSION }}
          body_path: RELEASE_NOTES.md
          target_commitish: ${{ github.event.workflow_run.head_sha }}
          draft: true
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            ./artifacts/*.msi
            ./artifacts/*.exe
            ./artifacts/*.app.zip
            ./artifacts/*.AppImage
            ./artifacts/*.deb