name: Release

on:
  push:
    tags: ["v*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  ci-check:
    uses: ./.github/workflows/ci.yml

  build:
    needs: [ci-check]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            bundle-glob: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe
            tauri-bundles: ""

          - os: macos-14
            target: aarch64-apple-darwin
            bundle-glob: |
              FlowRename.app.zip
            tauri-bundles: -- --bundles app,zip

          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundle-glob: |
              src-tauri/target/release/bundle/appimage/*.AppImage
              src-tauri/target/release/bundle/deb/*.deb
            tauri-bundles: ""

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('Cargo.toml', 'src-tauri/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Run cargo clippy (warnings as errors)
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Build Tauri app (${{ runner.os }})
        run: npm run tauri build ${{ matrix.tauri-bundles }}

      - name: Zip macOS .app bundle (for easy download)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          app_path=$(ls src-tauri/target/release/bundle/macos/*.app 2>/dev/null | head -1)
          if [ -n "$app_path" ]; then
            ditto -c -k --sequesterRsrc "$app_path" FlowRename.app.zip
            echo "Zipped .app bundle to FlowRename.app.zip"
          else
            echo "No .app bundle found"
          fi

      - name: List bundle artifacts
        shell: bash
        run: |
          echo "=== Bundle directory contents ==="
          find src-tauri/target/release/bundle -type f 2>/dev/null || echo "(no bundle dir)"

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ runner.os }}
          path: ${{ matrix.bundle-glob }}
          if-no-files-found: warn

  create-release:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all bundle artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bundle-*
          merge-multiple: true

      - name: Extract tag version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Generate release notes
        shell: bash
        run: |
          VERSION="${{ env.VERSION }}"
          cat > RELEASE_NOTES.md << EOF
          ## FlowRename v${VERSION}

          ### Downloads
          | Platform | File |
          |---|---|
          | Windows | \`*.msi\` / \`*.exe\` |
          | macOS (Apple Silicon) | \`*.zip\` (解压后得到 \`.app\`) |
          | Linux | \`*.AppImage\` / \`*.deb\` |

          ### System Requirements
          - **Windows**: Windows 10+, WebView2 Runtime (bundled)
          - **macOS**: macOS 10.15+ (Catalina), Apple Silicon
          - **Linux**: WebKit2GTK 4.1, GTK3
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: FlowRename v${{ env.VERSION }}
          body_path: RELEASE_NOTES.md
          draft: true
          prerelease: false
          fail_on_unmatched_files: false
          files: |
            *.msi
            *.exe
            *.AppImage
            *.deb
            *.zip
