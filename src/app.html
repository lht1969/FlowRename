<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FlowRename - 批量重命名工具</title>
    <!-- Google Fonts: Inter Variable + JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <script>
      (function () {
        var stored = localStorage.getItem("adr-theme");
        var themes = ["modern", "wintry", "obsidian", "daylight"];
        var theme =
          stored && themes.indexOf(stored) !== -1 ? stored : "daylight";
        document.body.setAttribute("data-theme", theme);
      })();
    </script>
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
